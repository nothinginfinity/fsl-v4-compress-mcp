name: Deploy FSL V4 MCP to Cloudflare

# Trigger this by hand from the Actions tab (the "Run workflow" button works
# fine from the GitHub iOS app or Safari - no terminal needed). It also
# auto-runs whenever you edit worker.js/schema.sql/wrangler.jsonc on main.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'workers/afo-fsl-v4-compress-mcp/**'

# Required repo secrets (Settings -> Secrets and variables -> Actions -> New repository secret):
#   CLOUDFLARE_API_TOKEN  - Cloudflare API token with "D1 Edit" + "Workers Scripts Edit" permissions
#   CLOUDFLARE_ACCOUNT_ID - found on the Cloudflare dashboard Workers & Pages overview page
#   FSL_GITHUB_PAT        - a GitHub token (classic, 'repo' scope, or fine-grained Contents:Read)
#                           this becomes the worker's own GITHUB_TOKEN secret, used at runtime
#                           by compress_repo_v4 to fetch the repos *you* point it at - unrelated
#                           to the two secrets above, which only authenticate this deploy job.

concurrency:
  group: fsl-v4-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/afo-fsl-v4-compress-mcp
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DB_NAME: afo-fsl-v4-compress-db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Verify Cloudflare credentials are set
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID repo secret. See the comment block at the top of this workflow file for setup steps."
            exit 1
          fi

      - name: Check Cloudflare auth (wrangler whoami)
        run: |
          wrangler --version
          echo "--- whoami ---"
          wrangler whoami || {
            echo "::error::wrangler whoami failed. Your CLOUDFLARE_API_TOKEN is most likely invalid, expired, or scoped to the wrong account. Re-check it in Cloudflare dashboard -> My Profile -> API Tokens."
            exit 1
          }

      - name: Resolve or create D1 database
        run: |
          set -uo pipefail
          extract_id() {
            jq -r '
              (if type=="array" then . else (.result // [.]) end)
              | .[]?
              | select((.name // "")==$n)
              | (.uuid // .database_id // .id // empty)
            ' --arg n "$DB_NAME" 2>/dev/null | head -n1
          }

          echo "=== attempt 1: wrangler d1 list --json ==="
          LIST_JSON=$(wrangler d1 list --json 2>&1)
          echo "$LIST_JSON"
          DB_ID=$(echo "$LIST_JSON" | extract_id)

          if [ -z "${DB_ID:-}" ]; then
            echo "=== attempt 2: wrangler d1 info (in case it already exists) ==="
            INFO_JSON=$(wrangler d1 info "$DB_NAME" --json 2>&1)
            echo "$INFO_JSON"
            DB_ID=$(echo "$INFO_JSON" | jq -r '(.uuid // .database_id // .id // empty)' 2>/dev/null)
          fi

          if [ -z "${DB_ID:-}" ]; then
            echo "=== attempt 3: create it ==="
            CREATE_OUT=$(wrangler d1 create "$DB_NAME" --json 2>&1)
            echo "$CREATE_OUT"
            DB_ID=$(echo "$CREATE_OUT" | jq -r '(.uuid // .database_id // .id // empty)' 2>/dev/null)
          fi

          if [ -z "${DB_ID:-}" ]; then
            echo "=== attempt 4: re-list after create ==="
            LIST_JSON=$(wrangler d1 list --json 2>&1)
            echo "$LIST_JSON"
            DB_ID=$(echo "$LIST_JSON" | extract_id)
          fi

          if [ -z "${DB_ID:-}" ]; then
            echo "=== attempt 5: plain-text table parse (last resort) ==="
            TABLE_OUT=$(wrangler d1 list 2>&1)
            echo "$TABLE_OUT"
            DB_ID=$(echo "$TABLE_OUT" | grep -i "$DB_NAME" | grep -Eo '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -n1)
          fi

          if [ -z "${DB_ID:-}" ]; then
            echo "::error::Could not resolve a database_id for $DB_NAME after 5 attempts. Scroll up - one of the attempts above almost certainly printed the real wrangler/Cloudflare error (commonly: API token missing D1 permission, or wrong account id)."
            exit 1
          fi

          echo "Using D1 database_id: $DB_ID"
          sed -i "s/pending-create-on-deploy/$DB_ID/" wrangler.jsonc
          cat wrangler.jsonc

      - name: Apply schema.sql to D1 (remote)
        run: wrangler d1 execute "$DB_NAME" --remote --file=schema.sql

      - name: Set worker secret (GITHUB_TOKEN)
        run: echo "${{ secrets.FSL_GITHUB_PAT }}" | wrangler secret put GITHUB_TOKEN

      - name: Deploy worker
        run: wrangler deploy

      - name: Done
        run: echo "Deployed. Check the 'Deploy worker' step above for your live workers.dev URL."
