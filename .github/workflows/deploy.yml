name: Deploy FSL V4 MCP to Cloudflare

# Trigger this by hand from the Actions tab (the "Run workflow" button works
# fine from the GitHub iOS app or Safari - no terminal needed). It also
# auto-runs whenever you edit worker.js/schema.sql/wrangler.jsonc on main.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'workers/afo-fsl-v4-compress-mcp/**'

# Required repo secrets (Settings -> Secrets and variables -> Actions -> New repository secret):
#   CLOUDFLARE_API_TOKEN  - Cloudflare API token with "D1 Edit" + "Workers Scripts Edit" permissions
#   CLOUDFLARE_ACCOUNT_ID - found on the Cloudflare dashboard Workers & Pages overview page
#   FSL_GITHUB_PAT        - a GitHub token (classic, 'repo' scope, or fine-grained Contents:Read)
#                           this becomes the worker's own GITHUB_TOKEN secret, used at runtime
#                           by compress_repo_v4 to fetch the repos *you* point it at - unrelated
#                           to the two secrets above, which only authenticate this deploy job.

concurrency:
  group: fsl-v4-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/afo-fsl-v4-compress-mcp
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DB_NAME: afo-fsl-v4-compress-db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Verify Cloudflare credentials are set
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID repo secret. See the comment block at the top of this workflow file for setup steps."
            exit 1
          fi

      - name: Check Cloudflare auth (wrangler whoami)
        run: |
          wrangler --version
          echo "--- whoami ---"
          wrangler whoami || {
            echo "::error::wrangler whoami failed. Your CLOUDFLARE_API_TOKEN is most likely invalid, expired, or scoped to the wrong account. Re-check it in Cloudflare dashboard -> My Profile -> API Tokens."
            exit 1
          }

      # NOTE: this step intentionally does NOT use `wrangler d1 list/info --json`.
      # Their JSON output shape isn't stable across wrangler versions (confirmed -
      # the id field came back null). The Cloudflare REST API itself has a fixed,
      # documented schema, so we call it directly with curl instead.
      - name: Resolve or create D1 database (via Cloudflare API directly)
        run: |
          set -euo pipefail
          API="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database"

          echo "=== Listing existing D1 databases ==="
          LIST_JSON=$(curl -s -X GET "$API" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json")
          echo "$LIST_JSON" | jq . || echo "$LIST_JSON"

          SUCCESS=$(echo "$LIST_JSON" | jq -r '.success // false')
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Cloudflare API list call failed (success=false above). Check CLOUDFLARE_API_TOKEN has 'D1 Edit' permission on this account and CLOUDFLARE_ACCOUNT_ID is correct."
            exit 1
          fi

          DB_ID=$(echo "$LIST_JSON" | jq -r --arg n "$DB_NAME" '.result[] | select(.name==$n) | .uuid' | head -n1)

          if [ -z "${DB_ID:-}" ] || [ "$DB_ID" = "null" ]; then
            echo "=== Database '$DB_NAME' not found, creating it ==="
            CREATE_JSON=$(curl -s -X POST "$API" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$DB_NAME\"}")
            echo "$CREATE_JSON" | jq . || echo "$CREATE_JSON"

            CREATE_SUCCESS=$(echo "$CREATE_JSON" | jq -r '.success // false')
            if [ "$CREATE_SUCCESS" != "true" ]; then
              echo "::error::Failed to create D1 database via Cloudflare API. See response above for the real error (commonly: token missing D1 Edit permission)."
              exit 1
            fi
            DB_ID=$(echo "$CREATE_JSON" | jq -r '.result.uuid')
          else
            echo "Found existing database '$DB_NAME'"
          fi

          if [ -z "${DB_ID:-}" ] || [ "$DB_ID" = "null" ]; then
            echo "::error::Still could not resolve a database_id for $DB_NAME after list+create. See raw API responses above."
            exit 1
          fi

          echo "Using D1 database_id: $DB_ID"
          sed -i "s/pending-create-on-deploy/$DB_ID/" wrangler.jsonc
          cat wrangler.jsonc

      - name: Apply schema.sql to D1 (remote)
        run: wrangler d1 execute "$DB_NAME" --remote --file=schema.sql

      - name: Set worker secret (GITHUB_TOKEN)
        run: echo "${{ secrets.FSL_GITHUB_PAT }}" | wrangler secret put GITHUB_TOKEN

      - name: Deploy worker
        run: wrangler deploy

      - name: Done
        run: echo "Deployed. Check the 'Deploy worker' step above for your live workers.dev URL."
